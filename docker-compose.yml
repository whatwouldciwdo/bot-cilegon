services:
  # ── WAHA: WhatsApp HTTP API ────────────────────────────
  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: unless-stopped
    ports:
      - "3010:3000" # dashboard & API WAHA -> http://localhost:3010
    environment:
      # Kirim event "message" ke backend bot
      WHATSAPP_HOOK_URL: "http://bot:3001/webhook"
      WHATSAPP_HOOK_EVENTS: "message"
      # API key TETAP supaya WAHA tidak generate key acak tiap restart.
      # (kalau kosong, WAHA bikin key baru terus -> auth dashboard kacau)
      WAHA_API_KEY: "bot-cilegon-secret-2026"
      # --- Login dashboard WAHA (http://localhost:3010) ---
      # WAHA 2026 menolak password lemah (mis. "admin") & generate acak tiap
      # restart. Maka password dipin ke string kuat di bawah ini supaya TETAP.
      WAHA_DASHBOARD_USERNAME: "admin"
      WAHA_DASHBOARD_PASSWORD: "BotCilegon2026Pass"
      # Login Swagger / API docs (boleh sama dengan dashboard)
      WHATSAPP_SWAGGER_USERNAME: "admin"
      WHATSAPP_SWAGGER_PASSWORD: "BotCilegon2026Pass"
    volumes:
      - waha_sessions:/app/.sessions # simpan sesi WA (tidak perlu scan QR ulang)

  # ── Backend bot ────────────────────────────────────────
  bot:
    build: .
    container_name: bot-cilegon
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3001"
      WAHA_URL: "http://waha:3000"
      WAHA_API_KEY: "bot-cilegon-secret-2026"
    ports:
      - "3001:3001" # backend bot
    volumes:
      - ./logs:/app/logs # log persist di host
    depends_on:
      - waha

volumes:
  waha_sessions:
