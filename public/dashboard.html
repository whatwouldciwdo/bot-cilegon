<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Bot Nominasi CL</title>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --line: #334155; --text: #e2e8f0;
      --muted: #94a3b8; --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
      --blue: #3b82f6; --slate: #64748b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--text); padding: 24px;
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px; margin-bottom: 24px;
    }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 10px;
      padding: 16px;
    }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .card .value { font-size: 28px; font-weight: 700; margin-top: 6px; }
    .card .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .b-success { background: rgba(34,197,94,.15); color: var(--green); }
    .b-error { background: rgba(239,68,68,.15); color: var(--red); }
    .b-ignored { background: rgba(100,116,139,.2); color: var(--slate); }
    .b-sent { background: rgba(34,197,94,.15); color: var(--green); }
    .b-skipped { background: rgba(245,158,11,.15); color: var(--amber); }
    .b-failed { background: rgba(239,68,68,.15); color: var(--red); }
    .b-unknown { background: rgba(100,116,139,.2); color: var(--slate); }
    .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    select, button {
      background: var(--card); color: var(--text); border: 1px solid var(--line);
      border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer;
    }
    button:hover { border-color: var(--blue); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .mono { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; color: var(--muted); }
    .raw { color: var(--muted); font-size: 12px; max-width: 360px; white-space: pre-wrap; word-break: break-word; }
    .alert {
      border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; font-size: 14px;
      border: 1px solid;
    }
    .alert-ok { background: rgba(34,197,94,.08); border-color: var(--green); color: var(--green); }
    .alert-warn { background: rgba(239,68,68,.08); border-color: var(--red); color: var(--red); }
    .tbl-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 10px; overflow: auto; }
  </style>
</head>
<body>
  <h1>📊 Dashboard Bot Nominasi CL</h1>
  <div class="sub" id="updated">Memuat…</div>

  <div id="emailAlert"></div>

  <div class="grid" id="cards"></div>

  <div class="toolbar">
    <label for="statusFilter" style="color:var(--muted);font-size:13px">Filter:</label>
    <select id="statusFilter">
      <option value="">Semua</option>
      <option value="success">Sukses</option>
      <option value="error">Gagal</option>
      <option value="ignored">Diabaikan</option>
    </select>
    <select id="limit">
      <option value="50">50 terbaru</option>
      <option value="100" selected>100 terbaru</option>
      <option value="250">250 terbaru</option>
    </select>
    <button id="refresh">↻ Muat ulang</button>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Waktu</th><th>Status</th><th>Tanggal</th>
          <th>Swap</th><th>Stok</th><th>Total</th><th>Email</th><th>Detail</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    const fmtTime = (iso) => {
      if (!iso) return '-';
      const d = new Date(iso);
      return d.toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'medium' });
    };
    const esc = (s) => String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    function card(label, value, hint) {
      return '<div class="card"><div class="label">' + label + '</div>' +
        '<div class="value">' + value + '</div>' +
        (hint ? '<div class="hint">' + hint + '</div>' : '') + '</div>';
    }

    function renderStats(s) {
      document.getElementById('updated').textContent =
        'Terakhir aktivitas: ' + fmtTime(s.lastTimestamp) + ' • Total entri log: ' + s.total;

      const cards = [
        card('Nominasi Diproses', s.processed, s.success + ' sukses · ' + s.error + ' gagal'),
        card('Success Rate', s.successRate + '%', 'dari nominasi diproses'),
        card('Email Terkirim', s.email.sent, s.email.failed + ' gagal · ' + s.email.skipped + ' dilewati'),
        card('Email Delivery', s.emailDeliveryRate == null ? '—' : s.emailDeliveryRate + '%',
          s.emailAttempts + ' percobaan kirim'),
        card('Duplikat Diabaikan', s.duplicate, 'anti-duplikat'),
        card('Gagal Balas WA', s.sendFailed, 'send_failed'),
      ];
      document.getElementById('cards').innerHTML = cards.join('');

      const alertEl = document.getElementById('emailAlert');
      const totalEmailFail = s.email.failed + s.emailFailedEvents;
      if (s.emailAttempts === 0 && s.email.skipped > 0) {
        alertEl.innerHTML = '<div class="alert alert-warn">⚠️ Email dinonaktifkan / dilewati (' +
          s.email.skipped + ' nominasi). Aktifkan EMAIL_ENABLED untuk mulai mengirim.</div>';
      } else if (totalEmailFail === 0 && s.emailAttempts > 0) {
        alertEl.innerHTML = '<div class="alert alert-ok">✅ Semua email terkirim (' +
          s.email.sent + '/' + s.emailAttempts + '). Tidak ada kegagalan.</div>';
      } else if (totalEmailFail > 0) {
        alertEl.innerHTML = '<div class="alert alert-warn">⚠️ Ada ' + totalEmailFail +
          ' email GAGAL terkirim. Mohon cek manual.</div>';
      } else {
        alertEl.innerHTML = '';
      }
    }

    function renderRows(history) {
      if (!history.length) {
        document.getElementById('rows').innerHTML =
          '<tr><td colspan="8" style="color:var(--muted)">Belum ada data.</td></tr>';
        return;
      }
      document.getElementById('rows').innerHTML = history.map((h) => {
        const statusBadge = '<span class="badge b-' + esc(h.status) + '">' + esc(h.status) + '</span>';
        const emailBadge = h.email
          ? '<span class="badge b-' + esc(h.email) + '">' + esc(h.email) + '</span>'
          : '<span class="mono">-</span>';
        let detail = '';
        if (h.status === 'error' && h.errors) detail = '<div class="raw">' + h.errors.map(esc).join('<br>') + '</div>';
        else if (h.status === 'ignored') detail = '<span class="mono">' + esc(h.reason || '') + '</span>';
        else if (h.raw) detail = '<div class="raw">' + esc(h.raw.split('\n')[0]) + '</div>';
        return '<tr>' +
          '<td class="mono">' + fmtTime(h.timestamp) + '</td>' +
          '<td>' + statusBadge + '</td>' +
          '<td>' + esc(h.date || '-') + '</td>' +
          '<td>' + (h.swapping == null ? '-' : esc(h.swapping)) + '</td>' +
          '<td>' + (h.stokLNG == null ? '-' : esc(h.stokLNG)) + '</td>' +
          '<td>' + (h.total == null ? '-' : '<b>' + esc(h.total) + '</b>') + '</td>' +
          '<td>' + emailBadge + '</td>' +
          '<td>' + detail + '</td>' +
        '</tr>';
      }).join('');
    }

    async function load() {
      const status = document.getElementById('statusFilter').value;
      const limit = document.getElementById('limit').value;
      const q = new URLSearchParams({ limit });
      if (status) q.set('status', status);
      try {
        const res = await fetch('/api/dashboard?' + q.toString());
        const data = await res.json();
        renderStats(data.stats);
        renderRows(data.history);
      } catch (err) {
        document.getElementById('updated').textContent = 'Gagal memuat data: ' + err.message;
      }
    }

    document.getElementById('refresh').addEventListener('click', load);
    document.getElementById('statusFilter').addEventListener('change', load);
    document.getElementById('limit').addEventListener('change', load);
    load();
    setInterval(load, 30000); // auto-refresh tiap 30 detik
  </script>
</body>
</html>
